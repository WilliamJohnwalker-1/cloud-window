# Cloudflare Worker for Payment API
name = "inventory-payment"
main = "workers/payment.js"
compatibility_date = "2024-01-01"

[env.production]
vars = { }

# D1 Database binding
# [[d1_databases]]
# binding = "PAYMENT_DB"
# database_name = "inventory-payments"
# database_id = "your-database-id"

[vars]
# These should be set via Cloudflare Dashboard or secrets
# PAYMENT_MOCK = "true"
# WECHAT_MCH_ID = ""
# WECHAT_API_KEY = ""
# WECHAT_APP_ID = ""
# ALIPAY_APP_ID = ""
# ALIPAY_PRIVATE_KEY = ""
# ALIPAY_PUBLIC_KEY = ""

# Secrets (set via: wrangler secret put)
# wrangler secret put WECHAT_MCH_ID
# wrangler secret put WECHAT_API_KEY
# wrangler secret put WECHAT_APP_ID
# wrangler secret put ALIPAY_APP_ID
# wrangler secret put ALIPAY_PRIVATE_KEY
# wrangler secret put ALIPAY_PUBLIC_KEY
