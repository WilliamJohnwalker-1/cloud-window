# Cloudflare Worker for Payment API
name = "cloud-window"
main = "workers/payment.js"
compatibility_date = "2024-01-01"

[env.production]
vars = { }

[[env.production.r2_buckets]]
binding = "MOBILE_APK_BUCKET"
bucket_name = "cloud-window-apk-prod"

# D1 Database binding
# [[d1_databases]]
# binding = "PAYMENT_DB"
# database_name = "inventory-payments"
# database_id = "your-database-id"

[vars]
# These should be set via Cloudflare Dashboard or secrets
# PAYMENT_MOCK = "true"
# WECHAT_MCH_ID = ""
# WECHAT_API_KEY = ""
# WECHAT_APP_ID = ""
# ALIPAY_APP_ID = ""
# ALIPAY_PRIVATE_KEY = ""
# ALIPAY_PUBLIC_KEY = ""
# MOBILE_LATEST_VERSION = "2.1.6"
# MOBILE_ANDROID_APK_KEY = "inventory-app-2.1.6.apk"
# MOBILE_ANDROID_APK_URL = "" # Optional: if empty, /mobile/latest.json will use /mobile/download/latest.apk

# Secrets (set via: wrangler secret put)
# wrangler secret put WECHAT_MCH_ID
# wrangler secret put WECHAT_API_KEY
# wrangler secret put WECHAT_APP_ID
# wrangler secret put ALIPAY_APP_ID
# wrangler secret put ALIPAY_PRIVATE_KEY
# wrangler secret put ALIPAY_PUBLIC_KEY
